---
# RBAC: Allow the webhook to read ConfigMaps
apiVersion: v1
kind: ServiceAccount
metadata:
  name: llm-webhook-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: llm-webhook-role
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: llm-webhook-rolebinding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: llm-webhook-sa
    namespace: default
roleRef:
  kind: Role
  name: llm-webhook-role
  apiGroup: rbac.authorization.k8s.io
---
# Deployment & Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-webhook
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-webhook
  template:
    metadata:
      labels:
        app: llm-webhook
    spec:
      serviceAccountName: llm-webhook-sa
      containers:
        - name: webhook
          image: llm-scheduler-webhook:latest
          imagePullPolicy: Never # Crucial for Kind
          ports:
            - containerPort: 4443
          volumeMounts:
            - name: tls-certs
              mountPath: "/tls"
              readOnly: true
      volumes:
        - name: tls-certs
          secret:
            secretName: llm-webhook-tls
---
apiVersion: v1
kind: Service
metadata:
  name: llm-webhook-service
  namespace: default
spec:
  ports:
    - port: 443
      targetPort: 4443
  selector:
    app: llm-webhook
---
# Webhook Configuration
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: llm-scheduler-mutation
webhooks:
  - name: mutate.llmscheduler.local
    clientConfig:
      service:
        name: llm-webhook-service
        namespace: default
        path: "/mutate"
      caBundle: "${CA_BUNDLE}"
    rules:
      - operations: ["CREATE"]
        apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods"]
    sideEffects: None
    admissionReviewVersions: ["v1"]
    # We ignore the webhook's own namespace to prevent infinite loops
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values: ["kube-system"]